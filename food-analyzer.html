<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Analyzer AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f13;
            color: #e8e8f0;
            min-height: 100vh;
        }

        header {
            background: #1a1a24;
            border-bottom: 1px solid #2a2a38;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header h1 { font-size: 22px; font-weight: 700; color: #fff; }
        header span { font-size: 28px; }

        .container {
            max-width: 900px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* ── API Key section ── */
        .api-section {
            background: #1a1a24;
            border: 1px solid #2a2a38;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .api-section label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #9090b0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .api-key-row { display: flex; gap: 10px; }

        .api-key-row select,
        .api-key-row input {
            background: #0f0f13;
            border: 1px solid #2a2a38;
            border-radius: 10px;
            padding: 12px 16px;
            color: #e8e8f0;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .api-key-row input { flex: 1; font-family: monospace; }
        .api-key-row select { cursor: pointer; }

        .api-key-row select:focus,
        .api-key-row input:focus {
            outline: none;
            border-color: #6c63ff;
        }

        /* ── Upload area ── */
        .upload-section {
            background: #1a1a24;
            border: 2px dashed #2a2a38;
            border-radius: 16px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            margin-bottom: 24px;
            position: relative;
        }

        .upload-section:hover,
        .upload-section.drag-over {
            border-color: #6c63ff;
            background: #1e1e2e;
        }

        .upload-section input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon { font-size: 48px; margin-bottom: 16px; }
        .upload-section h3 { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .upload-section p  { font-size: 14px; color: #6060a0; }

        /* ── Image preview ── */
        .preview-section { display: none; margin-bottom: 24px; }
        .preview-section.visible { display: block; }

        .preview-container {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #1a1a24;
            border: 1px solid #2a2a38;
        }

        .preview-container img {
            width: 100%;
            max-height: 350px;
            object-fit: cover;
            display: block;
        }

        .preview-overlay { position: absolute; top: 12px; right: 12px; }

        .btn-remove {
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Analyze button ── */
        .analyze-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c63ff, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 32px;
            display: none;
        }

        .analyze-btn.visible { display: block; }
        .analyze-btn:hover   { opacity: 0.9; }
        .analyze-btn:active  { transform: scale(0.99); }
        .analyze-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── Loading ── */
        .loading { display: none; text-align: center; padding: 48px; }
        .loading.visible { display: block; }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid #2a2a38;
            border-top-color: #6c63ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Results ── */
        .results { display: none; }
        .results.visible { display: block; }

        .results-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .card {
            background: #1a1a24;
            border: 1px solid #2a2a38;
            border-radius: 16px;
            padding: 24px;
        }

        .card-label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #6060a0;
            margin-bottom: 10px;
        }

        .card-value { font-size: 28px; font-weight: 800; color: #fff; }
        .card-sub   { font-size: 13px; color: #6060a0; margin-top: 4px; }

        .food-name-card {
            grid-column: 1 / -1;
            background: linear-gradient(135deg, #1e1a3a, #1a1a24);
            border-color: #3a2a68;
        }

        .food-name-card .card-value {
            font-size: 32px;
            background: linear-gradient(135deg, #a78bfa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .calories-card {
            background: linear-gradient(135deg, #1a2e1a, #1a1a24);
            border-color: #2a4a2a;
        }

        .calories-card .card-value { color: #4ade80; }

        /* Nutrition grid */
        .nutrition-card   { grid-column: 1 / -1; }

        .nutrition-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 16px;
        }

        .nutrition-item {
            background: #0f0f13;
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .nutrition-item .label {
            font-size: 11px;
            color: #6060a0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .nutrition-item .value { font-size: 20px; font-weight: 700; color: #e8e8f0; }

        /* Recipes */
        .recipes-card { grid-column: 1 / -1; }

        .recipe {
            background: #0f0f13;
            border-radius: 12px;
            padding: 20px;
            margin-top: 14px;
        }

        .recipe h4 { font-size: 16px; font-weight: 700; color: #a78bfa; margin-bottom: 8px; }
        .recipe p  { font-size: 13px; color: #9090b0; margin-bottom: 12px; line-height: 1.5; }

        .recipe-section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #6060a0;
            margin-bottom: 8px;
        }

        .ingredients-list { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }

        .ingredient-tag {
            background: #1a1a24;
            border: 1px solid #2a2a38;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 12px;
            color: #b0b0d0;
        }

        .steps-list { list-style: none; counter-reset: step-counter; }

        .steps-list li {
            counter-increment: step-counter;
            display: flex;
            gap: 12px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #b0b0d0;
            line-height: 1.5;
        }

        .steps-list li::before {
            content: counter(step-counter);
            background: #6c63ff;
            color: #fff;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            min-width: 22px;
            font-size: 11px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Error */
        .error-box {
            background: #2a1a1a;
            border: 1px solid #4a2a2a;
            border-radius: 12px;
            padding: 20px;
            color: #ff6b6b;
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
        }

        .error-box.visible { display: block; }

        /* Responsive */
        @media (max-width: 600px) {
            header { padding: 16px 20px; }
            .results-grid { grid-template-columns: 1fr; }
            .food-name-card,
            .nutrition-card,
            .recipes-card { grid-column: 1; }
            .nutrition-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <span>🍽️</span>
    <h1>Food Analyzer AI</h1>
</header>

<div class="container">

    <!-- API Key -->
    <div class="api-section">
        <label>API Configuration</label>
        <div class="api-key-row">
            <select id="provider">
                <option value="openai">OpenAI (GPT-4o)</option>
                <option value="anthropic">Anthropic (Claude)</option>
            </select>
            <input type="password" id="apiKey" placeholder="Paste your API key here..." />
        </div>
    </div>

    <!-- Upload -->
    <div class="upload-section" id="uploadArea">
        <input type="file" id="fileInput" accept="image/*" />
        <div class="upload-icon">📸</div>
        <h3>Upload a food photo</h3>
        <p>Drag & drop or click to browse · JPG, PNG, WEBP supported</p>
    </div>

    <!-- Preview -->
    <div class="preview-section" id="previewSection">
        <div class="preview-container">
            <img id="previewImg" src="" alt="Food preview" />
            <div class="preview-overlay">
                <button class="btn-remove" id="removeBtn" title="Remove image">✕</button>
            </div>
        </div>
    </div>

    <!-- Error message -->
    <div class="error-box" id="errorBox"></div>

    <!-- Analyze -->
    <button class="analyze-btn" id="analyzeBtn">🔍 Analyze Food</button>

    <!-- Loading spinner -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p style="color:#9090b0;font-size:14px;">Analyzing your food, please wait…</p>
    </div>

    <!-- Results -->
    <div class="results" id="results">
        <div class="results-grid">

            <!-- Food name -->
            <div class="card food-name-card">
                <div class="card-label">Identified Food</div>
                <div class="card-value" id="r-name">—</div>
            </div>

            <!-- Calories -->
            <div class="card calories-card">
                <div class="card-label">Estimated Calories</div>
                <div class="card-value" id="r-calories">—</div>
                <div class="card-sub">per serving</div>
            </div>

            <!-- Serving size -->
            <div class="card">
                <div class="card-label">Serving Size</div>
                <div class="card-value" id="r-serving" style="font-size:20px;">—</div>
            </div>

            <!-- Nutritional facts -->
            <div class="card nutrition-card">
                <div class="card-label">Nutritional Facts</div>
                <div class="nutrition-grid" id="r-nutrition"></div>
            </div>

            <!-- Recipes -->
            <div class="card recipes-card">
                <div class="card-label">Recipe Ideas</div>
                <div id="r-recipes"></div>
            </div>

        </div>
    </div>

</div>

<script>
    // ── Element refs ──────────────────────────────────────────────
    const fileInput      = document.getElementById('fileInput');
    const uploadArea     = document.getElementById('uploadArea');
    const previewSection = document.getElementById('previewSection');
    const previewImg     = document.getElementById('previewImg');
    const removeBtn      = document.getElementById('removeBtn');
    const analyzeBtn     = document.getElementById('analyzeBtn');
    const loadingEl      = document.getElementById('loading');
    const resultsEl      = document.getElementById('results');
    const errorBox       = document.getElementById('errorBox');
    const apiKeyInput    = document.getElementById('apiKey');
    const providerSelect = document.getElementById('provider');

    let currentBase64 = null;
    let currentMime   = 'image/jpeg';

    // ── Drag & Drop ───────────────────────────────────────────────
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('drag-over');
    });

    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('drag-over');
    });

    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleFile(file);
    });

    fileInput.addEventListener('change', () => {
        if (fileInput.files[0]) handleFile(fileInput.files[0]);
    });

    // ── Remove image ──────────────────────────────────────────────
    removeBtn.addEventListener('click', () => {
        currentBase64 = null;
        previewImg.src = '';
        previewSection.classList.remove('visible');
        analyzeBtn.classList.remove('visible');
        resultsEl.classList.remove('visible');
        errorBox.classList.remove('visible');
        fileInput.value = '';
    });

    // ── Handle selected file ──────────────────────────────────────
    function handleFile(file) {
        currentMime = file.type || 'image/jpeg';
        const reader = new FileReader();
        reader.onload = (e) => {
            const dataUrl = e.target.result;
            currentBase64 = dataUrl.split(',')[1];
            previewImg.src = dataUrl;
            previewSection.classList.add('visible');
            analyzeBtn.classList.add('visible');
            resultsEl.classList.remove('visible');
            errorBox.classList.remove('visible');
        };
        reader.readAsDataURL(file);
    }

    // ── Analyze button ────────────────────────────────────────────
    analyzeBtn.addEventListener('click', analyzeFood);

    async function analyzeFood() {
        const apiKey = apiKeyInput.value.trim();
        if (!apiKey) { showError('Please enter your API key first.'); return; }
        if (!currentBase64) { showError('Please upload a food image first.'); return; }

        setLoading(true);
        errorBox.classList.remove('visible');
        resultsEl.classList.remove('visible');

        try {
            const provider = providerSelect.value;
            const data = provider === 'openai'
                ? await callOpenAI(apiKey)
                : await callAnthropic(apiKey);
            renderResults(data);
        } catch (err) {
            showError(err.message || 'Something went wrong. Check your API key and try again.');
        } finally {
            setLoading(false);
        }
    }

    // ── Shared prompt ─────────────────────────────────────────────
    const PROMPT = `You are a food nutrition expert. Analyze this food image and return ONLY a valid JSON object — no markdown, no backticks, no explanation.

Use this exact structure:
{
  "foodName": "Full descriptive name of the food",
  "calories": "estimated number only (e.g. 350)",
  "servingSize": "e.g. 1 cup (240ml) or 1 slice (100g)",
  "nutritionalFacts": {
    "protein": "Xg",
    "carbohydrates": "Xg",
    "fat": "Xg",
    "fiber": "Xg",
    "sugar": "Xg",
    "sodium": "Xmg"
  },
  "recipes": [
    {
      "name": "Recipe name",
      "description": "1-2 sentence description of the dish",
      "ingredients": ["ingredient 1", "ingredient 2", "ingredient 3"],
      "steps": ["Step 1 description", "Step 2 description", "Step 3 description"]
    },
    {
      "name": "Second recipe name",
      "description": "1-2 sentence description",
      "ingredients": ["ingredient 1", "ingredient 2"],
      "steps": ["Step 1", "Step 2", "Step 3"]
    }
  ]
}

Return ONLY the raw JSON object. Nothing else.`;

    // ── OpenAI (GPT-4o) ───────────────────────────────────────────
    async function callOpenAI(apiKey) {
        const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${apiKey}`
            },
            body: JSON.stringify({
                model: 'gpt-4o',
                max_tokens: 2000,
                messages: [{
                    role: 'user',
                    content: [
                        {
                            type: 'image_url',
                            image_url: { url: `data:${currentMime};base64,${currentBase64}` }
                        },
                        { type: 'text', text: PROMPT }
                    ]
                }]
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `OpenAI API error ${res.status}`);
        }

        const json = await res.json();
        const text = json.choices?.[0]?.message?.content || '';
        return parseJSON(text);
    }

    // ── Anthropic (Claude) ────────────────────────────────────────
    async function callAnthropic(apiKey) {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': apiKey,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-access': 'true'
            },
            body: JSON.stringify({
                model: 'claude-opus-4-6',
                max_tokens: 2000,
                messages: [{
                    role: 'user',
                    content: [
                        {
                            type: 'image',
                            source: {
                                type: 'base64',
                                media_type: currentMime,
                                data: currentBase64
                            }
                        },
                        { type: 'text', text: PROMPT }
                    ]
                }]
            })
        });

        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            throw new Error(err.error?.message || `Anthropic API error ${res.status}`);
        }

        const json = await res.json();
        const text = json.content?.[0]?.text || '';
        return parseJSON(text);
    }

    // ── JSON parser (robust) ──────────────────────────────────────
    function parseJSON(text) {
        // Strip any markdown fences the model might add
        const clean = text.replace(/```json\s*/g, '').replace(/```\s*/g, '').trim();
        try {
            return JSON.parse(clean);
        } catch {
            // Fallback: extract first {...} block
            const match = clean.match(/\{[\s\S]*\}/);
            if (match) return JSON.parse(match[0]);
            throw new Error('Could not parse the AI response. Try again.');
        }
    }

    // ── Render results ────────────────────────────────────────────
    function renderResults(data) {
        document.getElementById('r-name').textContent =
            data.foodName || '—';

        document.getElementById('r-calories').textContent =
            data.calories ? `${data.calories} kcal` : '—';

        document.getElementById('r-serving').textContent =
            data.servingSize || '—';

        // Nutritional facts
        const nutrition = data.nutritionalFacts || {};
        const items = [
            { label: 'Protein',  key: 'protein',       color: '#818cf8' },
            { label: 'Carbs',    key: 'carbohydrates', color: '#f59e0b' },
            { label: 'Fat',      key: 'fat',           color: '#ef4444' },
            { label: 'Fiber',    key: 'fiber',         color: '#10b981' },
            { label: 'Sugar',    key: 'sugar',         color: '#ec4899' },
            { label: 'Sodium',   key: 'sodium',        color: '#6366f1' },
        ];

        document.getElementById('r-nutrition').innerHTML = items.map(item => `
            <div class="nutrition-item">
                <div class="label">${item.label}</div>
                <div class="value" style="color:${item.color}">${nutrition[item.key] || '—'}</div>
            </div>
        `).join('');

        // Recipes
        const recipes = data.recipes || [];
        document.getElementById('r-recipes').innerHTML = recipes.map(r => `
            <div class="recipe">
                <h4>🍳 ${r.name || 'Recipe'}</h4>
                <p>${r.description || ''}</p>
                <div class="recipe-section-title">Ingredients</div>
                <div class="ingredients-list">
                    ${(r.ingredients || []).map(i => `<span class="ingredient-tag">${i}</span>`).join('')}
                </div>
                <div class="recipe-section-title">Steps</div>
                <ol class="steps-list">
                    ${(r.steps || []).map(s => `<li>${s}</li>`).join('')}
                </ol>
            </div>
        `).join('');

        resultsEl.classList.add('visible');
    }

    // ── Helpers ───────────────────────────────────────────────────
    function setLoading(on) {
        loadingEl.classList.toggle('visible', on);
        analyzeBtn.disabled = on;
        analyzeBtn.textContent = on ? '⏳ Analyzing…' : '🔍 Analyze Food';
    }

    function showError(msg) {
        errorBox.textContent = `⚠️  ${msg}`;
        errorBox.classList.add('visible');
    }
</script>
</body>
</html>
